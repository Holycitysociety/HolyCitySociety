<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holy City Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #071427;
      --text: #eef2f7;
      --muted: rgba(238, 242, 247, 0.78);
      --muted-soft: rgba(238, 242, 247, 0.64);
      --line: rgba(255, 255, 255, 0.14);
      --line-soft: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      --radius: 34px;
      --shell: 1280px;
      --gold-soft: rgba(214, 193, 156, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "EB Garamond", Garamond, Baskerville, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(calc(100% - 44px), var(--shell));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      transition:
        background-color 220ms ease,
        backdrop-filter 220ms ease,
        border-color 220ms ease,
        box-shadow 220ms ease,
        padding 220ms ease;
      background: rgba(7, 20, 39, 0.94);
      border-bottom: 1px solid var(--line-soft);
      box-shadow: var(--shadow);
    }

    .site-header.is-scrolled {
      background: rgba(7, 20, 39, 0.14);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border-bottom-color: rgba(255, 255, 255, 0.04);
      box-shadow: none;
    }

    .header-inner {
      padding: 22px 0 24px;
      transition: padding 220ms ease;
    }

    .site-header.is-scrolled .header-inner {
      padding: 12px 0 14px;
    }

    .top-nav {
      display: flex;
      justify-content: center;
      gap: 42px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      color: var(--muted-soft);
      transition: margin 220ms ease, opacity 220ms ease;
    }

    .top-nav a:hover,
    .top-nav a[aria-current="page"] {
      color: var(--text);
    }

    .site-header.is-scrolled .top-nav {
      margin-bottom: 10px;
    }

    .title-block {
      text-align: center;
      max-width: 980px;
      margin: 0 auto;
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .title-line {
      margin: 0;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(1.28rem, 1.52vw, 1.56rem);
      line-height: 1.04;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text);
      text-wrap: balance;
    }

    .title-line + .title-line {
      margin-top: 4px;
    }

    .title-small {
      margin: 6px 0;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(0.92rem, 0.96vw, 1rem);
      line-height: 1.02;
      font-style: italic;
      font-weight: 500;
      color: var(--gold-soft);
    }

    .header-body {
      max-width: 760px;
      margin: 18px auto 0;
      transition: margin 220ms ease, opacity 220ms ease, max-height 220ms ease;
    }

    .site-header.is-scrolled .header-body {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      margin-top: 0;
    }

    .header-copy {
      margin: 0 0 14px;
      font-size: 0.86rem;
      line-height: 1.72;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      color: rgba(238, 242, 247, 0.92);
      text-wrap: balance;
    }

    .header-quote {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.72;
      font-style: italic;
      text-align: center;
      color: rgba(238, 242, 247, 0.82);
      text-wrap: balance;
    }

    .hero-panel {
      position: relative;
      width: min(calc(100% - 44px), var(--shell));
      margin: 10px auto 40px;
      min-height: 170vh;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      background: #dfe8f0;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      background: url("B34EE0E8-7698-45C1-A5B6-EF87853A96F7.jpeg") center center / cover no-repeat;
    }

    .hero-spacer {
      position: relative;
      min-height: 170vh;
    }

    .site-footer {
      padding: 0 0 34px;
    }

    .footer-rule {
      width: min(calc(100% - 44px), var(--shell));
      margin: 0 auto 14px;
      height: 1px;
      background: rgba(255, 255, 255, 0.18);
    }

    .footer-copy {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.74rem;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .header-inner {
        padding: 18px 0 20px;
      }

      .top-nav {
        gap: 28px;
        font-size: 0.74rem;
      }

      .title-line {
        font-size: 1.18rem;
      }

      .header-copy,
      .header-quote {
        font-size: 0.84rem;
      }

      .hero-panel,
      .hero-spacer {
        min-height: 130vh;
      }
    }

    @media (max-width: 640px) {
      .shell,
      .hero-panel,
      .footer-rule {
        width: min(calc(100% - 24px), var(--shell));
      }

      .top-nav {
        gap: 18px;
        margin-bottom: 14px;
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        flex-wrap: wrap;
      }

      .title-line {
        font-size: 0.98rem;
        letter-spacing: 0.025em;
      }

      .title-small {
        font-size: 0.78rem;
      }

      .header-copy,
      .header-quote {
        font-size: 0.8rem;
      }

      .hero-panel {
        border-radius: 22px;
        margin-top: 8px;
      }

      .hero-panel,
      .hero-spacer {
        min-height: 110vh;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="shell header-inner">
      <nav class="top-nav" aria-label="Primary">
        <a href="index.html" aria-current="page">Praxis</a>
        <a href="virtues.html">Energeia</a>
      </nav>

      <div class="title-block">
        <h1 class="title-line">Holy City Society</h1>
        <p class="title-small">of the</p>
        <p class="title-line">Ordo Equestris Civitatis Sanctae</p>
        <p class="title-line">The Equestrian Order of the Holy City</p>
      </div>

      <div class="header-body">
        <p class="header-copy">
          Continuing the quest to build an<br>
          illuminated, free, and holy society
        </p>

        <p class="header-quote">
          “Ye are the light of the world. A city that is set on a hill cannot be hid.”
        </p>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-panel" aria-label="Holy City image panel">
      <div class="hero-image" role="img" aria-label="Blue engraved holy city on a hill with mounted riders"></div>
      <div class="hero-spacer"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-rule"></div>
    <div class="footer-copy">Ordo Equestris Civitatis Sanctae</div>
  </footer>

  <script>
    const header = document.getElementById('siteHeader');

    function updateHeaderState() {
      if (window.scrollY > 40) {
        header.classList.add('is-scrolled');
      } else {
        header.classList.remove('is-scrolled');
      }
    }

    updateHeaderState();
    window.addEventListener('scroll', updateHeaderState, { passive: true });
  </script>
</body>
</html>
