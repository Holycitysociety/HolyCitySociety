<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holy City Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #071427;
      --text: #eef2f7;
      --muted: rgba(238, 242, 247, 0.74);
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      --shadow-soft: 0 20px 48px rgba(0, 0, 0, 0.14);
      --radius: 34px;
      --radius-card: 28px;
      --shell: 1280px;
      --card-bg: #ffffff;
      --card-line: rgba(24, 28, 34, 0.05);
      --ink: #191d24;
      --ink-soft: #74664f;
      --quote-ink: #4a4f57;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "EB Garamond", Garamond, Baskerville, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(calc(100% - 44px), var(--shell));
      margin: 0 auto;
    }

    .site-header {
      padding-top: 34px;
      padding-bottom: 22px;
    }

    .top-nav {
      display: flex;
      justify-content: center;
      gap: 42px;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .top-nav a:hover,
    .top-nav a[aria-current="page"] {
      color: var(--text);
    }

    .page-wordmark {
      text-align: center;
    }

    .page-wordmark-main {
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(2.1rem, 3.6vw, 4.2rem);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f6f7f4;
    }

    .hero-panel {
      position: relative;
      margin-top: 10px;
      margin-bottom: 40px;
      min-height: 180vh;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero-image {
      position: absolute;
      inset: 0;
      background: url("B34EE0E8-7698-45C1-A5B6-EF87853A96F7.jpeg") center center / cover no-repeat;
    }

    .hero-overlay {
      position: relative;
      z-index: 2;
      min-height: 180vh;
      padding: 28px;
    }

    .hero-card {
      position: sticky;
      top: 28px;
      width: min(540px, calc(100% - 28px));
      padding: 34px 34px 30px;
      background: var(--card-bg);
      color: var(--ink);
      border: 1px solid var(--card-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      text-align: center;
    }

    .card-title {
      margin: 0 0 8px;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(2.2rem, 2.75vw, 3.2rem);
      line-height: 0.98;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .card-connector {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(1rem, 1.15vw, 1.22rem);
      line-height: 1.05;
      font-style: italic;
      color: var(--ink-soft);
    }

    .card-latin {
      margin: 0 0 8px;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(1.32rem, 1.6vw, 1.8rem);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-wrap: balance;
    }

    .card-english {
      margin: 0 0 22px;
      font-family: "Cormorant Garamond", Cochin, Garamond, serif;
      font-size: clamp(1.22rem, 1.45vw, 1.6rem);
      line-height: 1.08;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #353942;
      text-wrap: balance;
    }

    .card-quote {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.72;
      font-style: italic;
      color: var(--quote-ink);
    }

    .site-footer {
      padding-bottom: 34px;
    }

    .footer-rule {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.18);
      margin-bottom: 14px;
    }

    .footer-copy {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.74rem;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .hero-panel,
      .hero-overlay {
        min-height: 130vh;
      }

      .hero-overlay {
        padding: 20px;
      }

      .hero-card {
        top: 20px;
        width: min(500px, 100%);
        padding: 28px 24px 24px;
      }

      .card-title {
        font-size: 2.45rem;
      }

      .card-latin {
        font-size: 1.42rem;
      }

      .card-english {
        font-size: 1.28rem;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 24px), var(--shell));
      }

      .site-header {
        padding-top: 22px;
      }

      .top-nav {
        gap: 18px;
        margin-bottom: 18px;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        flex-wrap: wrap;
      }

      .page-wordmark-main {
        font-size: 2rem;
        letter-spacing: 0.06em;
      }

      .hero-panel,
      .hero-overlay {
        min-height: 110vh;
      }

      .hero-panel {
        border-radius: 22px;
      }

      .hero-overlay {
        padding: 12px;
      }

      .hero-card {
        top: 12px;
        width: 100%;
        padding: 22px 18px 18px;
        border-radius: 18px;
      }

      .card-title {
        font-size: 1.95rem;
      }

      .card-connector {
        font-size: 0.92rem;
      }

      .card-latin {
        font-size: 1.02rem;
        letter-spacing: 0.04em;
      }

      .card-english {
        font-size: 0.98rem;
      }

      .card-quote {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header shell">
    <nav class="top-nav" aria-label="Primary">
      <a href="index.html" aria-current="page">Praxis</a>
      <a href="virtues.html">Energeia</a>
    </nav>

    <div class="page-wordmark" aria-label="Holy City Society">
      <div class="page-wordmark-main">Holy City Society</div>
    </div>
  </header>

  <main class="shell">
    <section class="hero-panel" aria-labelledby="card-title">
      <div class="hero-image" role="img" aria-label="Blue engraved holy city on a hill with mounted riders"></div>

      <div class="hero-overlay">
        <div class="hero-card">
          <h1 class="card-title" id="card-title">Holy City Society</h1>
          <p class="card-connector">of the</p>
          <p class="card-latin">Ordo Equestris Civitatis Sanctae</p>
          <p class="card-english">The Equestrian Order of the Holy City</p>
          <p class="card-quote">“Ye are the light of the world. A city that is set on a hill cannot be hid.”</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer shell">
    <div class="footer-rule"></div>
    <div class="footer-copy">Ordo Equestris Civitatis Sanctae</div>
  </footer>
</body>
</html>
