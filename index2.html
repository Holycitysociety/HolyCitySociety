<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holy City Society</title>
  <style>
    :root {
      --bg: #07162a;
      --text: #eef2f7;
      --muted: rgba(238, 242, 247, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --panel: #f6f4ef;
      --ink: #1a2028;
      --shell: 1240px;
      --radius: 34px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(calc(100% - 44px), var(--shell));
      margin: 0 auto;
    }

    .site-header {
      padding: 34px 0 22px;
    }

    .top-nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 26px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .top-nav a {
      opacity: 0.92;
    }

    .top-nav a:hover,
    .top-nav a[aria-current="page"] {
      color: var(--text);
    }

    .wordmark {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: clamp(1rem, 1.4vw, 1.42rem);
      color: #f5f7fb;
    }

    .hero {
      margin-top: 8px;
      margin-bottom: 40px;
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 390px 1fr;
      min-height: 980px;
    }

    .hero-copy {
      padding: 86px 46px 72px 58px;
    }

    .hero-kicker {
      margin: 0 0 26px;
      font-size: 0.98rem;
      line-height: 1.65;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .hero-title {
      margin: 0 0 30px;
      font-size: clamp(2rem, 2.2vw, 2.8rem);
      line-height: 1.14;
      font-weight: 400;
    }

    .hero-text {
      margin: 0 0 24px;
      font-size: 1.04rem;
      line-height: 1.85;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-quote {
      margin: 0;
      font-size: 1rem;
      line-height: 1.85;
      font-style: italic;
    }

    .hero-image {
      position: relative;
      background: url("B34EE0E8-7698-45C1-A5B6-EF87853A96F7.jpeg") center center / cover no-repeat;
    }

    .hero-image::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to left,
        rgba(246, 244, 239, 0) 58%,
        rgba(246, 244, 239, 0.82) 84%,
        rgba(246, 244, 239, 1) 100%
      );
    }

    .footer-line {
      width: min(calc(100% - 44px), 1120px);
      margin: 78px auto 28px;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }

    .footer {
      padding-bottom: 34px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .hero-grid {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .hero-copy {
        padding: 52px 28px 28px;
      }

      .hero-image {
        min-height: 620px;
      }

      .hero-image::before {
        background: linear-gradient(
          to top,
          rgba(246, 244, 239, 0) 60%,
          rgba(246, 244, 239, 0.18) 100%
        );
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(calc(100% - 24px), var(--shell));
      }

      .site-header {
        padding-top: 24px;
      }

      .top-nav {
        gap: 18px;
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        margin-bottom: 18px;
      }

      .wordmark {
        letter-spacing: 0.18em;
        font-size: 0.92rem;
      }

      .hero {
        border-radius: 22px;
      }

      .hero-copy {
        padding: 38px 20px 22px;
      }

      .hero-kicker,
      .hero-text,
      .hero-quote {
        max-width: none;
      }

      .hero-image {
        min-height: 460px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header shell">
    <nav class="top-nav" aria-label="Primary">
      <a href="index.html" aria-current="page">Praxis</a>
      <a href="virtues.html">Energeia</a>
      <a href="clergy.html">Clergy</a>
    </nav>

    <div class="wordmark">✠ Holy City Society ✠</div>
  </header>

  <main class="shell">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-grid">
        <div class="hero-copy">
          <p class="hero-kicker">Ordo Equestris Civitatis Sanctae</p>
          <h1 class="hero-title" id="hero-title">
            The Contemplative Order of Knights of the Holy City
          </h1>
          <p class="hero-text">
            Continuing the quest to build an illuminated, free, and holy society
          </p>
          <p class="hero-quote">
            “Ye are the light of the world. A city that is set on a hill cannot be hid.”
          </p>
        </div>

        <div class="hero-image" role="img" aria-label="Engraved blue city on a hill with mounted riders"></div>
      </div>
    </section>
  </main>

  <div class="footer-line"></div>

  <footer class="footer">
    Holy City Society
  </footer>
</body>
</html>
